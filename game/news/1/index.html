<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>诺兰德时报 - 深度报道 公正视角</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans SC', 'Noto Serif SC', serif; background: #f4f4f4; color: #333; line-height: 1.6; }
    .site-header { background: #1a1a1a; color: #fff; padding: 16px 24px; border-bottom: 4px solid #c00; }
    .site-name { font-weight: 700; font-size: 28px; letter-spacing: -0.5px; }
    .slogan { font-size: 13px; opacity: 0.85; margin-top: 6px; }
    .nav { margin-top: 12px; font-size: 14px; }
    .nav a { color: #fff; text-decoration: none; margin-right: 24px; }
    .nav a:hover { text-decoration: underline; }
    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
    .hero { background: #fff; padding: 40px; margin-bottom: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); text-align: center; }
    .hero h1 { font-size: 24px; color: #333; margin-bottom: 12px; font-weight: 600; }
    .hero .slogan-text { font-size: 16px; color: #666; }
    .section-title { font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 20px; padding-bottom: 8px; border-bottom: 2px solid #c00; }
    .story-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
    .story-card { background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden; transition: box-shadow 0.2s; }
    .story-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .story-card a { text-decoration: none; color: inherit; display: block; }
    .story-card img { width: 100%; height: 180px; object-fit: cover; }
    .story-card .content { padding: 20px; }
    .story-card .category { color: #c00; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .story-card h2 { font-size: 18px; font-weight: 600; line-height: 1.35; margin-bottom: 8px; }
    .story-card .meta { font-size: 13px; color: #999; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-name">诺兰德时报 NORLAND TIMES</div>
    <div class="slogan">深度报道 · 公正视角 · 诺兰德权威新闻源</div>
    <nav class="nav"><a href="../1/">首页</a><a href="/news/">新闻</a><a href="/politics/">政治</a></nav>
  </header>
  <main class="container">
    <div class="hero">
      <h1>深度报道，公正视角</h1>
      <p class="slogan-text">立足诺兰德，关注政治、教育与社会议题，为读者提供客观、深入的新闻报道。</p>
    </div>
    <div class="section-title">最新报道</div>
    <div class="story-grid">
      <article class="story-card">
        <a href="../1.html">
          <img src="../images/news1.png" alt="学生债务减免">
          <div class="content">
            <div class="category">政治 · 教育</div>
            <h2>政府通过学生债务减免计划，数十万毕业生受益</h2>
            <div class="meta">2025年3月9日 · 阿尔维斯</div>
          </div>
        </a>
      </article>
      <article class="story-card">
        <a href="../7.html">
          <img src="../images/news7.jpeg" alt="VCS情感支持研究">
          <div class="content">
            <div class="category">科技 · 社会</div>
            <h2>虚拟伴侣技术为部分人群提供情感支持，研究显示积极影响</h2>
            <div class="meta">2025年3月9日 · 阿尔维斯</div>
          </div>
        </a>
      </article>
    </div>
  </main>
</body>
</html>
